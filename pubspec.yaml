  url_launcher: ^6.3.1
  shared_preferences: ^2.3.5
  cupertino_icons: ^1.0.8
  launch_at_startup: ^0.5.1
  package_info_plus: ^8.1.2
  timezone: ^0.9.4
  macos_secure_bookmarks: ^0.2.1
