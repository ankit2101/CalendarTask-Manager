publish_to: 'none'

version: 3.0.8+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
