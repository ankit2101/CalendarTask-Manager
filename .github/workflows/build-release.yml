name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.2)'
        required: true
        default: 'v1.2.2'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }} || echo "Tag already exists, skipping"
          git push origin ${{ steps.tag.outputs.tag }} || echo "Tag already pushed, skipping"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## CalendarTask Manager ${{ steps.tag.outputs.tag }}

            See [CHANGELOG.md](https://github.com/ankit2101/CalendarTask-Manager/blob/main/CHANGELOG.md) for full release notes.

            ---

            ### Downloads

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon / Intel) | `CalendarTask.Manager.dmg` |
            | Windows 10+ (64-bit) | `CalendarTaskManager-windows.zip` |

            ---

            ### macOS Installation

            > The app is ad-hoc signed but **not notarized**. macOS may show _"app can't be opened"_ on first launch.

            **Option A — Install Helper (easiest)**
            1. Open `CalendarTask.Manager.dmg`
            2. Double-click **"Install CalendarTask Manager.command"**
            3. Enter your password if prompted — done ✓

            **Option B — Terminal**
            1. Drag the app to **Applications**
            2. Run: `xattr -cr "/Applications/CalendarTask Manager.app"`

            **Option C — System Settings**
            After trying to open: **System Settings → Privacy & Security → Open Anyway**

            ### Windows Installation
            1. Extract `CalendarTaskManager-windows.zip`
            2. Run `calendar_task_manager.exe`
            3. Windows Defender prompt → **More info → Run anyway**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd macos && pod install

      - name: Build macOS app
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Remove quarantine & ad-hoc sign
        run: |
          APP="build/macos/Build/Products/Release/calendar_task_manager.app"
          # Strip any quarantine attributes baked in during the build
          xattr -cr "$APP"
          # Ad-hoc sign every binary/framework inside the bundle so macOS
          # accepts the app without an Apple Developer certificate.
          # Sign nested frameworks and dylibs first, then the main bundle.
          find "$APP/Contents/Frameworks" -name "*.dylib" -o -name "*.framework" 2>/dev/null | \
            sort -r | xargs -I{} codesign --force --deep --sign - {} 2>/dev/null || true
          codesign --force --deep --sign - "$APP"

      - name: Create install helper script
        run: |
          cat > "Install CalendarTask Manager.command" << 'SCRIPT'
          #!/bin/bash
          # ── CalendarTask Manager – macOS Install Helper ──────────────────────
          # Copies the app to /Applications and removes the quarantine flag that
          # macOS adds to files downloaded from the internet.  Double-click this
          # file from the DMG to run it.
          # ─────────────────────────────────────────────────────────────────────
          set -e
          APP_NAME="CalendarTask Manager.app"
          DMG_DIR="$(cd "$(dirname "$0")" && pwd)"
          SRC="$DMG_DIR/$APP_NAME"
          DEST="/Applications/$APP_NAME"

          if [ ! -d "$SRC" ]; then
            osascript -e 'display alert "Install Helper" message "Could not find CalendarTask Manager.app next to this script."'
            exit 1
          fi

          echo "Copying to /Applications…"
          cp -R "$SRC" "$DEST" 2>/dev/null || { sudo cp -R "$SRC" "$DEST"; }

          echo "Clearing Gatekeeper quarantine…"
          xattr -cr "$DEST"

          osascript -e 'display notification "CalendarTask Manager installed successfully." with title "Install Complete"'
          open "$DEST"
          SCRIPT
          chmod +x "Install CalendarTask Manager.command"

      - name: Create DMG
        run: |
          # Stage folder for DMG contents
          mkdir -p dmg_contents
          cp -R "build/macos/Build/Products/Release/calendar_task_manager.app" \
            "dmg_contents/CalendarTask Manager.app"
          cp "Install CalendarTask Manager.command" "dmg_contents/"

          create-dmg \
            --volname "CalendarTask Manager" \
            --window-pos 200 120 \
            --window-size 860 400 \
            --icon-size 100 \
            --icon "CalendarTask Manager.app" 200 185 \
            --app-drop-link 600 185 \
            --icon "Install CalendarTask Manager.command" 400 310 \
            "CalendarTask.Manager.dmg" \
            "dmg_contents/"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: CalendarTask.Manager.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "CalendarTaskManager-windows.zip"

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: CalendarTaskManager-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
