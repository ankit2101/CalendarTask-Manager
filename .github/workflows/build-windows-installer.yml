name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.1.2)'
        required: true
        default: 'v1.1.2'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }} || echo "Tag already exists, skipping"
          git push origin ${{ steps.tag.outputs.tag }} || echo "Tag already pushed, skipping"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows Installer
        run: npm run make -- --platform win32 --arch x64

      - name: Find installer artifacts
        id: find_artifacts
        shell: bash
        run: |
          SETUP_EXE=$(find out/make -name "*.exe" | head -1)
          echo "setup_exe=$SETUP_EXE" >> $GITHUB_OUTPUT
          echo "setup_name=$(basename $SETUP_EXE)" >> $GITHUB_OUTPUT
          echo "Found installer: $SETUP_EXE"

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## CalendarTask Manager ${{ steps.tag.outputs.tag }}

            ### Windows Installation

            1. Download `${{ steps.find_artifacts.outputs.setup_name }}`
            2. Run the installer — it will install and launch automatically
            3. The app will appear in your Start Menu and system tray

            > **Requirements:** Windows 10 or later · 64-bit

            ---

            ### macOS

            See the separate macOS release for the DMG.
          files: ${{ steps.find_artifacts.outputs.setup_exe }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
